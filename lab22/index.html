<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>index </title>
</head>
<body>
	<!-- <a href="" onclick="onLinkClickHandler();">click me</a> -->

	<div onclick="onLinkClickHandler();" style="border: 3px solid red">click me</div>

	<label>user Name: <input type="text"></label>
	<!-- <button onclick="showInput()">Show</button> -->
	<div class="output">here</div>

	<script>
		let input = document.querySelector("[type='text']");
		let output = document.querySelector(".output");

		function onKeyPressHandler(event) {
			console.log(`test`);
			console.dir(event);
			if(event.keyCode === 13){
				showInput();
			}

		}

		function showInput() {
			output.innerHTML = input.value;
		}


		function onLinkClickHandler(event){
			// event.preventDefault();
			console.log(`Div was clicked`);
		}

		document.body.addEventListener('click', function(event) {
			console.log(`Body was clicked`);
		}, {capture:true})
		input.addEventListener('keypress', onKeyPressHandler);
	</script>
</body>
</html>
